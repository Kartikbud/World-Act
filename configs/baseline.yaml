paths:
  data_dir: data
  log_dir: logs
  save_dir: models

training:
  lr: 3.0e-4
  seed: 42
  gripper_coeff: 0.1
  epochs: 10
  batch_size: 64
  num_workers: 8
  persistent_workers: true
  pin_memory: true
  # auto: bf16 on Ampere+ (A100, L4, ...), fp16 on older CUDA (T4); or force bf16/fp16/off
  amp_dtype: auto

optimizer:
  betas: [0.9, 0.95]
  weight_decay: 0.05
