paths:
  data_dir: data
  log_dir: logs
  save_dir: models

training:
  frame_skip: 5
  lr: 3.0e-4
  seed: 42
  lambd: 0.1
  epochs: 10
  batch_size: 128
  num_workers: 8
  persistent_workers: true
  pin_memory: true
  window_size: 3
  # auto: bf16 on Ampere+ (A100, L4, ...), fp16 on older CUDA (T4); or force bf16/fp16/off
  amp_dtype: auto

model:
  embedding_dim: 192
  action_dim: 2
  pred_nheads: 16
  dropout: 0.1
  pred_nlayers: 6
  patch_size: 14
  enc_nheads: 3
  enc_nlayers: 12
  enc_npatches: 256

loss:
  knots: 17
  num_proj: 1024

optimizer:
  betas: [0.9, 0.95]
  weight_decay: 0.05
